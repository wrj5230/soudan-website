<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ラップ塗り パターンテスト</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; font-family: sans-serif; padding: 40px 32px; color: rgba(255,255,255,0.75); }

h1 { font-size: 10px; letter-spacing: 0.4em; color: rgba(255,255,255,0.2); margin-bottom: 36px; }

.layout { display: grid; grid-template-columns: 320px 1fr; gap: 40px; align-items: start; }

/* ── プレビュー ── */
.preview-wrap { position: sticky; top: 40px; }
canvas {
  display: block; border-radius: 2px;
  width: 100%; aspect-ratio: 1;
  image-rendering: pixelated;
}
.preview-label { font-size: 10px; letter-spacing: 0.25em; color: rgba(255,255,255,0.2); margin-top: 12px; text-align: center; }

/* ── コントロール ── */
.controls { display: flex; flex-direction: column; gap: 28px; }

.ctrl-group { display: flex; flex-direction: column; gap: 12px; }
.ctrl-group h2 { font-size: 9px; letter-spacing: 0.3em; color: rgba(255,255,255,0.18); border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 8px; }

.ctrl-row { display: flex; align-items: center; gap: 12px; }
.ctrl-label { font-size: 11px; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); width: 80px; flex-shrink: 0; }
.ctrl-val   { font-size: 11px; color: rgba(201,168,76,0.9); width: 36px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

input[type=range] {
  flex: 1; -webkit-appearance: none; height: 2px;
  background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: #c9a84c; cursor: pointer;
}

.color-row { display: flex; align-items: center; gap: 12px; }
.color-label { font-size: 11px; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); width: 80px; flex-shrink: 0; }
.swatch-list { display: flex; gap: 6px; flex-wrap: wrap; }
.sw {
  width: 22px; height: 22px; border-radius: 3px; cursor: pointer;
  border: 2px solid transparent; transition: border-color 0.15s;
}
.sw.active { border-color: rgba(255,255,255,0.6); }

/* ── プリセット ── */
.preset-row { display: flex; gap: 8px; flex-wrap: wrap; }
.preset-btn {
  padding: 7px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 2px;
  background: none; color: rgba(255,255,255,0.35); font-size: 10px; letter-spacing: 0.2em;
  cursor: pointer; transition: all 0.15s;
}
.preset-btn:hover { border-color: rgba(201,168,76,0.5); color: rgba(201,168,76,0.9); }

/* ── パラメーター表示 ── */
.param-display {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 2px; padding: 14px 16px;
  font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.9;
  font-family: monospace; letter-spacing: 0.03em;
}
.param-display span { color: rgba(201,168,76,0.8); }

/* ── シード ── */
.seed-row { display: flex; align-items: center; gap: 10px; }
.btn-seed {
  padding: 7px 18px; border: 1px solid rgba(255,255,255,0.1); border-radius: 2px;
  background: none; color: rgba(255,255,255,0.4); font-size: 10px; letter-spacing: 0.2em;
  cursor: pointer; transition: all 0.15s;
}
.btn-seed:hover { border-color: rgba(201,168,76,0.5); color: rgba(201,168,76,0.9); }
.seed-val { font-size: 11px; color: rgba(255,255,255,0.2); font-family: monospace; }
</style>
</head>
<body>

<h1>RAPTO PAINT — PATTERN EXPLORER</h1>

<div class="layout">

  <!-- 左：プレビュー -->
  <div class="preview-wrap">
    <canvas id="cv" width="512" height="512"></canvas>
    <p class="preview-label" id="preview-label">— preview —</p>
  </div>

  <!-- 右：コントロール -->
  <div class="controls">

    <!-- 色 -->
    <div class="ctrl-group">
      <h2>COLOR</h2>
      <div class="color-row">
        <span class="color-label">ベース色</span>
        <div class="swatch-list" id="base-swatches">
          <div class="sw active" style="background:#181520" data-color="#181520"></div>
          <div class="sw"        style="background:#1e3a6e" data-color="#1e3a6e"></div>
          <div class="sw"        style="background:#7a1f2e" data-color="#7a1f2e"></div>
          <div class="sw"        style="background:#0c0c0c" data-color="#0c0c0c"></div>
          <div class="sw"        style="background:#2e5e38" data-color="#2e5e38"></div>
          <div class="sw"        style="background:#4e3660" data-color="#4e3660"></div>
          <div class="sw"        style="background:#5c3d22" data-color="#5c3d22"></div>
        </div>
      </div>
      <div class="color-row">
        <span class="color-label">模様色</span>
        <div class="swatch-list" id="rapto-swatches">
          <div class="sw active" style="background:#c9a84c" data-color="#c9a84c"></div>
          <div class="sw"        style="background:#e8e8e8" data-color="#e8e8e8"></div>
          <div class="sw"        style="background:#8b1a1a" data-color="#8b1a1a"></div>
          <div class="sw"        style="background:#1e3a6e" data-color="#1e3a6e"></div>
          <div class="sw"        style="background:#2e5e38" data-color="#2e5e38"></div>
          <div class="sw"        style="background:#d4a8a8" data-color="#d4a8a8"></div>
        </div>
      </div>
    </div>

    <!-- スライダー -->
    <div class="ctrl-group">
      <h2>PATTERN</h2>
      <div class="ctrl-row">
        <span class="ctrl-label">スケール</span>
        <input type="range" id="sl-scale" min="1" max="12" step="0.1" value="5">
        <span class="ctrl-val" id="v-scale">5.0</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">筋の密度</span>
        <input type="range" id="sl-freq" min="0.05" max="1.2" step="0.01" value="0.3">
        <span class="ctrl-val" id="v-freq">0.30</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">歪み量</span>
        <input type="range" id="sl-dist" min="0.2" max="6" step="0.05" value="2.5">
        <span class="ctrl-val" id="v-dist">2.50</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">シャープさ</span>
        <input type="range" id="sl-pow" min="0.5" max="8" step="0.1" value="3">
        <span class="ctrl-val" id="v-pow">3.0</span>
      </div>
    </div>

    <!-- シード -->
    <div class="ctrl-group">
      <h2>SEED</h2>
      <div class="seed-row">
        <button class="btn-seed" id="btn-seed">シャッフル</button>
        <span class="seed-val" id="seed-label">seed: 0.000</span>
      </div>
    </div>

    <!-- プリセット -->
    <div class="ctrl-group">
      <h2>PRESETS</h2>
      <div class="preset-row">
        <button class="preset-btn" data-preset="marble">大理石</button>
        <button class="preset-btn" data-preset="flow">ゆるやか</button>
        <button class="preset-btn" data-preset="sharp">細かい筋</button>
        <button class="preset-btn" data-preset="wild">激しい</button>
        <button class="preset-btn" data-preset="wide">大ぶり</button>
      </div>
    </div>

    <!-- 現在のパラメーター -->
    <div class="ctrl-group">
      <h2>CURRENT PARAMS</h2>
      <div class="param-display" id="param-display"></div>
    </div>

  </div>
</div>

<script>
// ─── Perlinノイズ ────────────────────────────────────────────
const _p = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
const perm = new Uint8Array(512);
for (let i = 0; i < 256; i++) perm[i] = perm[i+256] = _p[i];

function fade(t) { return t*t*t*(t*(t*6-15)+10); }
function grad2(h, x, y) {
  const g = h & 3;
  return (g & 1 ? -(g < 2 ? x : y) : (g < 2 ? x : y))
       + (g & 2 ? -(g < 2 ? y : x) : (g < 2 ? y : x));
}
function noise2(x, y) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
  x -= Math.floor(x); y -= Math.floor(y);
  const u = fade(x), v = fade(y);
  const a = perm[X]+Y, b = perm[X+1]+Y;
  return (1-v)*((1-u)*grad2(perm[a],   x,   y) + u*grad2(perm[b],   x-1, y))
       +    v *((1-u)*grad2(perm[a+1], x,   y-1) + u*grad2(perm[b+1], x-1, y-1));
}
function fbm(x, y) {
  let v=0, amp=1, freq=1, max=0;
  for (let i=0; i<5; i++) { v += noise2(x*freq, y*freq)*amp; max+=amp; amp*=0.5; freq*=2; }
  return v/max;
}
function hexRgb(h) {
  return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
}

// ─── 状態 ────────────────────────────────────────────────────
let state = { scale: 5, freq: 0.3, dist: 2.5, pow: 3, seed: 0, baseHex: '#181520', raptoHex: '#c9a84c' };

// ─── 描画 ────────────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function draw() {
  const { scale, freq, dist, pow, seed, baseHex, raptoHex } = state;
  const size = 512;
  const base = hexRgb(baseHex), rapto = hexRgb(raptoHex);
  const img = ctx.createImageData(size, size);
  const d = img.data;
  const sx = seed, sy = seed * 1.7;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const nx = (x/size)*scale + sx, ny = (y/size)*scale + sy;
      const n = fbm(nx, ny);
      const marble = Math.abs(Math.sin((nx*freq + n*dist) * Math.PI));
      const t = Math.pow(marble, pow);
      const i = (y*size+x)*4;
      d[i]   = Math.round(base.r + (rapto.r-base.r)*t);
      d[i+1] = Math.round(base.g + (rapto.g-base.g)*t);
      d[i+2] = Math.round(base.b + (rapto.b-base.b)*t);
      d[i+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  updateParamDisplay();
}

function updateParamDisplay() {
  const { scale, freq, dist, pow, seed, baseHex, raptoHex } = state;
  document.getElementById('param-display').innerHTML =
    `scale: <span>${scale.toFixed(1)}</span><br>` +
    `freq:  <span>${freq.toFixed(2)}</span><br>` +
    `dist:  <span>${dist.toFixed(2)}</span><br>` +
    `pow:   <span>${pow.toFixed(1)}</span><br>` +
    `seed:  <span>${seed.toFixed(3)}</span><br>` +
    `base:  <span>${baseHex}</span><br>` +
    `rapto: <span>${raptoHex}</span>`;
}

// ─── スライダー ───────────────────────────────────────────────
function bindSlider(id, key, valId, fmt) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    state[key] = parseFloat(sl.value);
    vl.textContent = fmt(state[key]);
    draw();
  });
}
bindSlider('sl-scale', 'scale', 'v-scale', v => v.toFixed(1));
bindSlider('sl-freq',  'freq',  'v-freq',  v => v.toFixed(2));
bindSlider('sl-dist',  'dist',  'v-dist',  v => v.toFixed(2));
bindSlider('sl-pow',   'pow',   'v-pow',   v => v.toFixed(1));

// ─── カラースウォッチ ─────────────────────────────────────────
document.getElementById('base-swatches').addEventListener('click', e => {
  const sw = e.target.closest('.sw'); if (!sw) return;
  document.querySelectorAll('#base-swatches .sw').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  state.baseHex = sw.dataset.color;
  draw();
});
document.getElementById('rapto-swatches').addEventListener('click', e => {
  const sw = e.target.closest('.sw'); if (!sw) return;
  document.querySelectorAll('#rapto-swatches .sw').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  state.raptoHex = sw.dataset.color;
  draw();
});

// ─── シード ───────────────────────────────────────────────────
document.getElementById('btn-seed').addEventListener('click', () => {
  state.seed = Math.random() * 100;
  document.getElementById('seed-label').textContent = `seed: ${state.seed.toFixed(3)}`;
  draw();
});

// ─── プリセット ───────────────────────────────────────────────
const presets = {
  marble: { scale: 5,   freq: 0.30, dist: 2.5,  pow: 3.0 },
  flow:   { scale: 3,   freq: 0.15, dist: 1.2,  pow: 1.5 },
  sharp:  { scale: 8,   freq: 0.55, dist: 3.5,  pow: 5.0 },
  wild:   { scale: 6,   freq: 0.80, dist: 5.5,  pow: 2.0 },
  wide:   { scale: 2.5, freq: 0.12, dist: 4.0,  pow: 4.0 },
};
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = presets[btn.dataset.preset];
    Object.assign(state, p);
    document.getElementById('sl-scale').value = p.scale;
    document.getElementById('sl-freq').value  = p.freq;
    document.getElementById('sl-dist').value  = p.dist;
    document.getElementById('sl-pow').value   = p.pow;
    document.getElementById('v-scale').textContent = p.scale.toFixed(1);
    document.getElementById('v-freq').textContent  = p.freq.toFixed(2);
    document.getElementById('v-dist').textContent  = p.dist.toFixed(2);
    document.getElementById('v-pow').textContent   = p.pow.toFixed(1);
    draw();
  });
});

draw();
</script>
</body>
</html>
